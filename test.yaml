apiVersion: v1
data:
  collection: ambulance
  database: cv1-ambulance
kind: ConfigMap
metadata:
  name: cv1-ambulance-webapi-config-gck67dm74k
---
apiVersion: v1
data:
  init-db.js: |-
    const mongoHost = process.env.AMBULANCE_API_MONGODB_HOST
    const mongoPort = process.env.AMBULANCE_API_MONGODB_PORT

    const mongoUser = process.env.AMBULANCE_API_MONGODB_USERNAME
    const mongoPassword = process.env.AMBULANCE_API_MONGODB_PASSWORD

    const database = process.env.AMBULANCE_API_MONGODB_DATABASE
    const collection = process.env.AMBULANCE_API_MONGODB_COLLECTION

    const retrySeconds = parseInt(process.env.RETRY_CONNECTION_SECONDS || "5") || 5;

    // try to connect to mongoDB until it is not available
    let connection;
    while(true) {
        try {
            connection = Mongo(`mongodb://${mongoUser}:${mongoPassword}@${mongoHost}:${mongoPort}`);
            break;
        } catch (exception) {
            print(`Cannot connect to mongoDB: ${exception}`);
            print(`Will retry after ${retrySeconds} seconds`)
            sleep(retrySeconds * 1000);
        }
    }

    // if database and collection exists, exit with success - already initialized
    const databases = connection.getDBNames()
    if (databases.includes(database)) {
        const dbInstance = connection.getDB(database)
        collections = dbInstance.getCollectionNames()
        if (collections.includes(collection)) {
          print(`Collection '${collection}' already exists in database '${database}'`)
            process.exit(0);
        }
    }

    // initialize
    // create database and collection
    const db = connection.getDB(database)
    db.createCollection(collection)

    // create indexes
    db[collection].createIndex({ "id": 1 })

    //insert sample data
    let result = db[collection].insertMany([
        {
            "id": "bobulova",
            "name": "Dr.Bobulová",
            "roomNumber": "123",
            "predefinedConditions": [
                { "value": "Nádcha", "code": "rhinitis" },
                { "value": "Kontrola", "code": "checkup" }
            ]
        }
    ]);

    if (result.writeError) {
        console.error(result)
        print(`Error when writing the data: ${result.errmsg}`)
    }

    // exit with success
    process.exit(0);
kind: ConfigMap
metadata:
  name: cv1-ambulance-webapi-mongodb-init-7d6bm6f4c5
---
apiVersion: v1
kind: Service
metadata:
  name: cv1-ambulance-webapi
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: webapi-port
  selector:
    pod: cv1-ambulance-webapi-label
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cv1-ambulance-webapi
spec:
  replicas: 1
  selector:
    matchLabels:
      pod: cv1-ambulance-webapi-label
  template:
    metadata:
      labels:
        pod: cv1-ambulance-webapi-label
    spec:
      containers:
      - env:
        - name: AMBULANCE_API_MONGODB_HOST
          valueFrom:
            configMapKeyRef:
              key: host
              name: mongodb-connection
        - name: AMBULANCE_API_MONGODB_PORT
          valueFrom:
            configMapKeyRef:
              key: port
              name: mongodb-connection
        - name: AMBULANCE_API_MONGODB_USERNAME
          valueFrom:
            secretKeyRef:
              key: username
              name: mongodb-auth
        - name: AMBULANCE_API_MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: mongodb-auth
        - name: AMBULANCE_API_ENVIRONMENT
          value: production
        - name: AMBULANCE_API_PORT
          value: "8080"
        - name: AMBULANCE_API_MONGODB_DATABASE
          valueFrom:
            configMapKeyRef:
              key: database
              name: cv1-ambulance-webapi-config-gck67dm74k
        - name: AMBULANCE_API_MONGODB_COLLECTION
          valueFrom:
            configMapKeyRef:
              key: collection
              name: cv1-ambulance-webapi-config-gck67dm74k
        - name: AMBULANCE_API_MONGODB_TIMEOUT_SECONDS
          value: "5"
        image: petermicuch/ambulance-wl-webapi:latest
        imagePullPolicy: Always
        name: cv1-ambulance-wl-webapi-container
        ports:
        - containerPort: 8080
          name: webapi-port
        resources:
          limits:
            cpu: "0.3"
            memory: 512Mi
          requests:
            cpu: "0.01"
            memory: 64Mi
      - env:
        - name: PORT
          value: "8081"
        - name: URL
          value: /openapi
        - name: BASE_URL
          value: /openapi-ui
        - name: FILTER
          value: "true"
        - name: DISPLAY_OPERATION_ID
          value: "true"
        image: swaggerapi/swagger-ui
        imagePullPolicy: Always
        name: openapi-ui
        ports:
        - containerPort: 8081
          name: api-ui
        resources:
          limits:
            cpu: "0.1"
            memory: 64M
          requests:
            cpu: "0.01"
            memory: 16M
      initContainers:
      - command:
        - mongosh
        - --nodb
        - -f
        - /scripts/init-db.js
        env:
        - name: AMBULANCE_API_MONGODB_HOST
          valueFrom:
            configMapKeyRef:
              key: host
              name: mongodb-connection
        - name: AMBULANCE_API_MONGODB_PORT
          valueFrom:
            configMapKeyRef:
              key: port
              name: mongodb-connection
        - name: AMBULANCE_API_MONGODB_USERNAME
          valueFrom:
            secretKeyRef:
              key: username
              name: mongodb-auth
        - name: AMBULANCE_API_MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: mongodb-auth
        - name: AMBULANCE_API_PORT
          value: "8080"
        - name: AMBULANCE_API_MONGODB_DATABASE
          valueFrom:
            configMapKeyRef:
              key: database
              name: cv1-ambulance-webapi-config-gck67dm74k
        - name: AMBULANCE_API_MONGODB_COLLECTION
          valueFrom:
            configMapKeyRef:
              key: collection
              name: cv1-ambulance-webapi-config-gck67dm74k
        - name: RETRY_CONNECTION_SECONDS
          value: "5"
        image: mongo:latest
        imagePullPolicy: Always
        name: init-mongodb
        resources:
          limits:
            cpu: "0.1"
            memory: 256Mi
          requests:
            cpu: "0.01"
            memory: 128Mi
        volumeMounts:
        - mountPath: /scripts
          name: init-scripts
      volumes:
      - configMap:
          name: cv1-ambulance-webapi-mongodb-init-7d6bm6f4c5
        name: init-scripts
